<style>
  :root{
    --paper:#efe7d6; --paper-dark:#e4d9c1; --ink:#1c2b3a; --ink-soft:#4a5a68;
    --brass:#a5751f; --brass-light:#c99a3f; --line:#c9bda1; --card:#faf6ec;

  *{box-sizing:border-box;}
  body{

    background:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180' viewBox='0 0 180 180'><g fill='none' stroke='%23a5751f' stroke-width='0.6' opacity='0.05'><path d='M-20 40 Q 40 10, 100 40 T 220 40'/><path d='M-20 90 Q 40 60, 100 90 T 220 90'/><path d='M-20 140 Q 40 110, 100 140 T 220 140'/></g></svg>"),

<script>
/* =========================================================
   0) عرض أي خطأ مباشرة على الصفحة (للتشخيص)
   ========================================================= */
window.onerror = function(msg, url, line, col, error){
  console.warn('Background script warning (non-critical):', msg);
  return false;
};

/* =========================================================
   1) تحميل Firebase SDK ديناميكيًا مع إعادة محاولة تلقائية
   ========================================================= */
function loadScriptOnce(src){
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.crossOrigin = 'anonymous';
    s.onload = () => resolve(src);
    s.onerror = () => reject(new Error('فشل تحميل: ' + src));
    document.head.appendChild(s);
  });
}

async function loadScriptWithRetry(src, attempts){
  for (let i = 1; i <= attempts; i++){
    try{ await loadScriptOnce(src + (src.includes('?') ? '&' : '?') + 'retry=' + i); return; }
    catch(e){ if (i === attempts) throw e; await new Promise(r => setTimeout(r, 800)); }
  }
}

async function loadFirebaseSDK(){
  const base = "https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/";
  await loadScriptWithRetry(base + "firebase-app-compat.min.js", 3);
  await loadScriptWithRetry(base + "firebase-firestore-compat.min.js", 3);
}

/* =========================================================
   2) FIREBASE CONFIG — ⚠️ استبدل هذا الكائن بالكامل بالكود
   اللي يعطيك إياه Firebase Console بعد إنشاء المشروع:
   Project settings → General → Your apps → Web app → Config
   ========================================================= */

  appId: "1:134744574180:web:bd6370482b3548913e04f1"
};

let db = null;

async function initFirebase(){
  try{
    await loadFirebaseSDK();
    if (typeof firebase === 'undefined') {
      throw new Error('السكربتات تحمّلت لكن الكائن firebase غير موجود (احتمال تعارض مع إضافة بالمتصفح).');
    }
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
  }catch(e){
    const dbg = document.getElementById('debugBanner');
    dbg.style.display = 'block';
    dbg.style.direction = 'ltr';
    dbg.textContent = '⚠️ Firebase load/init failed: ' + e.message;
  }
}

/* =========================================================
   2) بيانات المدن والتصنيفات
   ========================================================= */
const CITIES = [
  { id:"paris",     name:"باريس",    country:"فرنسا" },
  { id:"marbella",  name:"ماربيا",   country:"إسبانيا" },
  { id:"london",    name:"لندن",     country:"بريطانيا" },
  { id:"barcelona", name:"برشلونة",  country:"إسبانيا" },
  { id:"geneva",    name:"جنيف",     country:"سويسرا" },
  { id:"madrid",    name:"مدريد",    country:"إسبانيا" },
  { id:"mallorca",  name:"مايوركا",  country:"إسبانيا" },
];

let customCities = []; // مدن أضفتها لاحقًا: [{id, name, country}]
let customCountries = []; // دول أضفتها بدون مدن بعد: ["اسم1", "اسم2"]
function allCities(){ return CITIES.concat(customCities); }

function countryOf(cityId){
  const c = allCities().find(c => c.id === cityId);
  return c ? c.country : "";
}

async function loadCustomCities(){
  try{
    const doc = await db.collection('settings').doc('cities-list').get();
    customCities = (doc.exists && Array.isArray(doc.data().cities)) ? doc.data().cities : [];
  }catch(e){ customCities = []; }
}

async function loadCustomCountries(){
  try{
    const doc = await db.collection('settings').doc('countries-list').get();
    customCountries = (doc.exists && Array.isArray(doc.data().countries)) ? doc.data().countries : [];
  }catch(e){ customCountries = []; }
}

async function saveCustomCountries(){
  try{
    await db.collection('settings').doc('countries-list').set({ countries: customCountries }, { merge:true });
  }catch(e){ showToast('تعذر حفظ الدولة'); }
}

async function addCountry(){
  const name = await openInputModal("دولة جديدة", "مثال: السعودية، قطر، أمريكا...", "");
  if (!name || !name.trim()) return;
  const clean = name.trim();
  if (!customCountries.includes(clean)) {
    customCountries.push(clean);
    await saveCustomCountries();
  }
  currentCountry = clean;
  showToast('تمت إضافة الدولة ✓ — ضيف لها مدينة الآن');
  renderCountryTabs();
  renderCityTabs();
  render();
}

async function addCity(){
  const name = await openInputModal("مدينة جديدة", "مثال: ميلانو، دبي...", "");
  if (!name || !name.trim()) return;
  const country = await openInputModal("الدولة", "مثال: إيطاليا، الإمارات...", currentCountry || "");
  if (country === null || !country.trim()) { showToast('لازم تحدد الدولة'); return; }
  const id = "city_" + Date.now();
  customCities.push({ id, name: name.trim(), country: country.trim() });
  try{
    await db.collection('settings').doc('cities-list').set({ cities: customCities }, { merge:true });
    showToast('تمت إضافة المدينة ✓');
  }catch(e){
    showToast('تعذر الحفظ — حاول مرة ثانية');
    return;
  }
  await loadCity(id); // ينقلك مباشرة للمدينة الجديدة عشان تبدأ التعبئة
}

async function removeCity(cityId){
  customCities = customCities.filter(c => c.id !== cityId);
  try{
    await db.collection('settings').doc('cities-list').set({ cities: customCities }, { merge:true });
    showToast('تم حذف المدينة');
  }catch(e){ showToast('تعذر الحذف'); }
  loadCity(pickInitialCity());
}

/* =========================================================
   3) الحالة العامة
   ========================================================= */
let currentCityId = CITIES[0].id;
let currentCountry = CITIES[0].country;
let links = {};          // { itemId: {url, active, name} }
let customItems = [];    // [{id, section, icon, name}]
let editMode = false;
let editPassword = "";
let cityStatus = {};     // { cityId: true/false } — true = منشورة وظاهرة للزوار
let sectionStatus = {};  // { sectionTitle: true/false } — true (أو غير موجود) = القسم الرئيسي ظاهر

/* =========================================================
   4) تحميل/حفظ من Firestore
   بنية الوثيقة: cities/{cityId} = { links: {...}, customItems: [...] }
   الإعدادات المشتركة (كلمة المرور): settings/app = { password: "" }
   ========================================================= */
async function trackVisit(){
  try{
    await db.collection('analytics').doc('visits').set(
      { count: firebase.firestore.FieldValue.increment(1) },
      { merge: true }
    );
  }catch(e){ /* صامت — ما نزعج الزائر لو فشل */ }
}

let visitCount = null;
async function loadVisitCount(){
  try{
    const doc = await db.collection('analytics').doc('visits').get();
    visitCount = doc.exists ? (doc.data().count || 0) : 0;
  }catch(e){ visitCount = null; }
}

async function loadAllCityStatus(){
  try{
    const snap = await db.collection('cities').get();
    const map = {};
    snap.forEach(doc => { map[doc.id] = doc.data().published === true; });
    cityStatus = map;
  }catch(e){
    cityStatus = {};
  }
}

function pickInitialCity(){
  if (cityStatus[currentCityId]) return currentCityId;
  const firstPublished = allCities().find(c => cityStatus[c.id]);
  return firstPublished ? firstPublished.id : CITIES[0].id;
}

async function loadCity(cityId){
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('sections').style.display = 'none';
  currentCityId = cityId;
  currentCountry = countryOf(cityId) || currentCountry;
  try{
    const doc = await db.collection('cities').doc(cityId).get();
    const data = doc.exists ? doc.data() : {};
    links = data.links || {};
    customItems = data.customItems || [];
    cityStatus[cityId] = data.published === true;
    sectionStatus = data.sectionStatus || {};
  }catch(e){
    links = {}; customItems = []; sectionStatus = {};
    const dbg = document.getElementById('debugBanner');
    if (dbg.style.display !== 'block') {
      dbg.style.display = 'block';
      dbg.style.direction = 'ltr';
      dbg.textContent = 'Firestore error: ' + (e && e.message ? e.message : e) + ' (code: ' + (e && e.code ? e.code : 'n/a') + ')';
    }
    showToast('خطأ بالاتصال — التفاصيل بالمربع الأحمر بالأعلى');
  }
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('sections').style.display = 'block';
  renderCountryTabs();
  renderCityTabs();
  render();
}

function selectCountry(country){
  currentCountry = country;
  const list = allCities().filter(c => c.country === country);
  const visible = editMode ? list : list.filter(c => cityStatus[c.id]);
  const target = visible.find(c => c.id === currentCityId) || visible[0];
  if (target) { loadCity(target.id); }
  else { renderCountryTabs(); renderCityTabs(); render(); }
}

function togglePublish(){
  cityStatus[currentCityId] = !cityStatus[currentCityId];
  saveCity();
  renderCountryTabs();
  renderCityTabs();
  render();
}

function toggleSectionStatus(title){
  sectionStatus[title] = sectionStatus[title] === false ? true : false;
  saveCity();
  render();
}

async function saveCity(){
  try{
    await db.collection('cities').doc(currentCityId).set(
      { links, customItems, published: cityStatus[currentCityId] === true, sectionStatus },
      { merge:true }
    );
    showToast('تم الحفظ ✓');
  }catch(e){
    showToast('تعذر الحفظ — تحقق من قواعد أمان Firestore');
  }
}

async function loadPassword(){
  try{
    const doc = await db.collection('settings').doc('app').get();
    editPassword = doc.exists ? (doc.data().password || "") : "";
  }catch(e){ editPassword = ""; }
}

function checkOwnerAccess(){
  const key = new URLSearchParams(window.location.search).get('key');
  if (key && editPassword && key === editPassword) {
    document.getElementById('ownerControls').style.display = 'contents';
    document.getElementById('pageTitle').textContent = 'MyPickz — Admin';
    document.getElementById('webAppTitle').setAttribute('content', 'MyPickz Admin');
    document.getElementById('touchIcon').setAttribute('href', 'icon-180-admin.png');
  }
}

async function savePassword(){
  try{
    await db.collection('settings').doc('app').set({ password: editPassword }, { merge:true });
  }catch(e){ showToast('تعذر حفظ كلمة المرور'); }
}

/* =========================================================
   5) واجهة المستخدم
   ========================================================= */
function renderCountryTabs(){
  const wrap = document.getElementById('countryTabs');
  const list = allCities().filter(c => c.country); // نتجاهل أي مدينة بدون دولة محددة
  const fromCities = [...new Set(
    (editMode ? list : list.filter(c => cityStatus[c.id])).map(c => c.country)
  )];
  const countries = editMode
    ? [...new Set(fromCities.concat(customCountries))]
    : fromCities;

  wrap.innerHTML = countries.map(country => `
    <button class="city-tab ${country === currentCountry ? 'active' : ''}" onclick="selectCountry('${country.replace(/'/g,"\\'")}')">
      ${country}
    </button>`).join('')
    + (editMode ? `<button class="city-tab" style="border-style:dashed; color:var(--brass);" onclick="addCountry()">➕ دولة جديدة</button>` : '');
}

function renderCityTabs(){
  const wrap = document.getElementById('cityTabs');
  const list = allCities().filter(c => c.country === currentCountry);
  const visibleCities = editMode ? list : list.filter(c => cityStatus[c.id]);
  wrap.innerHTML = visibleCities.map(c => `
    <span style="display:inline-flex; align-items:center; gap:4px;">
      <button class="city-tab ${c.id === currentCityId ? 'active' : ''}" onclick="loadCity('${c.id}')">
        ${c.name}${editMode && !cityStatus[c.id] ? ' <i class="fa-solid fa-screwdriver-wrench"></i>' : ''}
      </button>
      ${editMode && c.id.startsWith('city_') ? `<button class="remove-btn" style="font-size:16px;" onclick="removeCity('${c.id}')" title="حذف المدينة">🗑️</button>` : ''}
    </span>`).join('')
    + (editMode ? `<button class="city-tab" style="border-style:dashed; color:var(--brass);" onclick="addCity()">➕ مدينة جديدة</button>` : '');
}

function getEntry(id){ return links[id] || { url:"", active:true, name:"" }; }
function displayName(item){ const e = getEntry(item.id); return e.name && e.name.length ? e.name : item.name; }

// يرجع مصفوفة المواقع لتصنيف معيّن، ويتحول تلقائيًا من الصيغة القديمة (رابط واحد بدون اسم) لو لقاها
function getPlaces(id){
  const e = getEntry(id);
  if (Array.isArray(e.places) && e.places.length) return e.places;
  if (e.url) return [{ name:"", url: e.url }];
  return [];
}

function ensurePlaces(id){
  const e = getEntry(id);
  if (!Array.isArray(e.places)) {
    e.places = e.url ? [{ name:"", url: e.url }] : [];
  }
  links[id] = e;
  return e;
}

function addPlace(id){
  const e = ensurePlaces(id);
  e.places.push({ name:"", url:"" });
  render();
}
function removePlace(id, index){
  const e = ensurePlaces(id);
  e.places.splice(index, 1);
  render();
}
function updatePlaceName(id, index, val){
  const e = ensurePlaces(id);
  if (e.places[index]) e.places[index].name = val;
}
function updatePlaceUrl(id, index, val){
  const e = ensurePlaces(id);
  if (e.places[index]) e.places[index].url = val.trim();
}

function updateName(id, val){ const e = getEntry(id); e.name = val.trim(); links[id] = e; }
function toggleActive(id, checked){ const e = getEntry(id); e.active = checked; links[id] = e; render(); }

async function addCustomItem(sectionTitle){
  const name = await openInputModal("تصنيف جديد", "مثال: Village, City...", "");
  if (!name || !name.trim()) return;
  const icon = await openInputModal("أيقونة التصنيف (إيموجي)", "الصق إيموجي مناسب، مثال: 🏘️", "🏷️");
  const id = "custom_" + Date.now();
  customItems.push({ id, section: sectionTitle, icon: (icon && icon.trim()) ? icon.trim() : "🏷️", name:name.trim() });
  await saveCity();
  render();
}
function removeCustomItem(id){
  customItems = customItems.filter(c => c.id !== id);
  delete links[id];
  saveCity();
  render();
}

function toggleEdit(){
  editMode = !editMode;
  document.getElementById('editBtnLabel').textContent = editMode ? 'إنهاء' : 'تعديل';
  document.getElementById('editIcon').innerHTML = editMode ? '<i class="fa-solid fa-xmark"></i>' : '<i class="fa-solid fa-pen"></i>';
  document.getElementById('editModeBanner').classList.toggle('show', editMode);
  document.getElementById('footerNote').style.display = editMode ? 'block' : 'none';
  if (!editMode && !cityStatus[currentCityId]) {
    loadCity(pickInitialCity());
    return;
  }
  renderCountryTabs();
  renderCityTabs();
  render();
}

async function requestEditAccess(){
  if (editMode){ toggleEdit(); return; }
  if (editPassword){
    const entered = await openInputModal("كلمة المرور", "أدخل كلمة المرور للتعديل", "");
    if (entered === null) return;
    if (entered !== editPassword){ showToast('كلمة مرور غير صحيحة'); return; }
  }
  await loadVisitCount();
  toggleEdit();
}

async function managePassword(){
  if (editPassword){
    const current = await openInputModal("تأكيد الهوية", "أدخل كلمة المرور الحالية", "");
    if (current === null) return;
    if (current !== editPassword){ showToast('كلمة مرور غير صحيحة'); return; }
  }
  const next = await openInputModal(editPassword ? "كلمة مرور جديدة" : "ضع كلمة مرور", "اتركها فارغة لإلغاء الحماية", "");
  if (next === null) return;
  editPassword = next.trim();
  await savePassword();
  showToast(editPassword ? 'تم تفعيل كلمة المرور ✓' : 'تم إلغاء كلمة المرور');
}

let expandedSections = {}; // { sectionTitle: true } — القسم مفتوح بالكامل
const COLLAPSE_LIMIT = 6;

function render(){
  const wrap = document.getElementById('sections');
  wrap.innerHTML = '';

  if (editMode) {
    const published = cityStatus[currentCityId] === true;
    const statusBar = document.createElement('div');
    statusBar.className = 'status-card';
    statusBar.innerHTML = `
      <button class="status-toggle ${published ? 'published' : ''}" onclick="togglePublish()">
        <span class="status-dot"></span>
        <span>${published ? 'منشورة — ظاهرة للزوار' : 'تحت التطوير — مخفية عن الزوار'}</span>
      </button>
      <div class="status-divider"></div>
      <div class="status-stat">👁️ ${visitCount === null ? '...' : visitCount} زيارة إجمالية</div>`;
    wrap.appendChild(statusBar);
  }

  // شريط تنقل سريع بين الأقسام — يظهر بس لو فيه أكثر من قسم فيه محتوى
  const visibleSections = DATA.filter(section => {
    if (!editMode && sectionStatus[section.title] === false) return false;
    const sectionCustom = customItems.filter(c => c.section === section.title);
    const allItems = section.items.concat(sectionCustom);
    const visibleItems = editMode ? allItems : allItems.filter(item => getEntry(item.id).active !== false);
    return visibleItems.length > 0;
  });
  if (visibleSections.length > 1) {
    const nav = document.createElement('div');
    nav.className = 'quick-nav';
    nav.innerHTML = visibleSections.map((section) => `
      <button class="quick-nav-btn" onclick="document.getElementById('sec-${DATA.indexOf(section)}').scrollIntoView({behavior:'smooth', block:'start'})" title="${section.title}">
        ${section.icon}
      </button>`).join('');
    wrap.appendChild(nav);
  }

  DATA.forEach((section, sIndex) => {
    if (!editMode && sectionStatus[section.title] === false) return;
    const sectionCustom = customItems.filter(c => c.section === section.title);
    const allItems = section.items.concat(sectionCustom);
    const visibleItems = editMode ? allItems : allItems.filter(item => getEntry(item.id).active !== false);
    if (!editMode && visibleItems.length === 0) return;

    const sectionOn = sectionStatus[section.title] !== false;
    const isExpanded = editMode || expandedSections[section.title] || visibleItems.length <= COLLAPSE_LIMIT;
    const itemsToShow = isExpanded ? visibleItems : visibleItems.slice(0, COLLAPSE_LIMIT);

    const sec = document.createElement('div');
    sec.className = 'section';
    sec.id = 'sec-' + sIndex;
    sec.innerHTML = `
      <div class="section-head">
        <span class="section-icon">${section.icon}</span>
        <h2>${section.title}</h2><span class="count">${visibleItems.length}</span>
        ${editMode ? `
          <button type="button" class="switch-btn ${sectionOn ? 'on' : ''}" style="margin-inline-start:auto;" onclick="toggleSectionStatus('${section.title.replace(/'/g,"\\'")}')"><span class="knob"></span></button>
          <span style="font-size:11px; color:var(--ink-soft); font-family:'Cairo',sans-serif;">${sectionOn ? 'ظاهر للزوار' : 'مخفي عن الزوار'}</span>` : ''}
      </div>
      <div class="grid">
        ${itemsToShow.map(item => {
          const entry = getEntry(item.id);
          const places = getPlaces(item.id);
          const active = entry.active !== false;
          const isCustom = item.id.startsWith('custom_');

          if (editMode) {
            const placeRows = places.map((p, i) => `
              <div class="place-row">
                <input type="text" class="place-name-input" placeholder="اسم المكان (مثال: Five Guys)"
                  value="${(p.name||'').replace(/"/g,'&quot;')}"
                  oninput="updatePlaceName('${item.id}', ${i}, this.value)">
                <input type="text" class="place-url-input" placeholder="رابط الموقع"
                  value="${(p.url||'').replace(/"/g,'&quot;')}"
                  oninput="updatePlaceUrl('${item.id}', ${i}, this.value)">
                <button type="button" class="remove-btn" onclick="removePlace('${item.id}', ${i}); return false;" title="حذف"><i class="fa-solid fa-trash"></i></button>
              </div>`).join('');

            return `
              <div class="ticket disabled multi-edit" style="${active ? '' : 'opacity:.45'}">
                <div class="icon-badge">${item.icon}</div>
                <div style="flex:1">
                  <input type="text" class="name-edit" value="${displayName(item).replace(/"/g,'&quot;')}" oninput="updateName('${item.id}', this.value)">
                  <div class="toggle-row">
                    <button type="button" class="switch-btn ${active ? 'on' : ''}" onclick="toggleActive('${item.id}', ${active ? 'false' : 'true'})"><span class="knob"></span></button>
                    <span>${active ? 'مفعّل' : 'موقوف'}</span>
                    ${isCustom ? `<button type="button" class="remove-btn" onclick="removeCustomItem('${item.id}')"><i class="fa-solid fa-trash"></i> حذف التصنيف</button>` : ''}
                  </div>
                  <div class="places-edit-list">
                    ${placeRows}
                  </div>
                  <button type="button" class="add-place-btn" onclick="addPlace('${item.id}')"><i class="fa-solid fa-plus"></i> إضافة موقع</button>
                </div>
              </div>`;
          }

          const validPlaces = places.filter(p => p.url);
          if (validPlaces.length === 1) {
            const p = validPlaces[0];
            return `<a class="ticket" href="${p.url}" target="_blank" rel="noopener">
                      <div class="icon-badge">${item.icon}</div>
                      <div class="name">${p.name && p.name.trim() ? p.name : displayName(item)}</div>
                      <div class="go">افتح ←</div>
                    </a>`;
          }
          if (validPlaces.length > 1) {
            return `<div class="ticket multi-ticket">
                      <div class="multi-head"><div class="icon-badge">${item.icon}</div><div class="name">${displayName(item)}</div></div>
                      <div class="place-list">
                        ${validPlaces.map(p => `<a class="place-link" href="${p.url}" target="_blank" rel="noopener">${p.name && p.name.trim() ? p.name : 'موقع'} ←</a>`).join('')}
                      </div>
                    </div>`;
          }
          return `<div class="ticket disabled"><div class="icon-badge">${item.icon}</div><div class="name">${displayName(item)}</div><div class="missing">قريبًا</div></div>`;
        }).join('')}
        ${editMode ? `<button type="button" class="ticket add-ticket" onclick="addCustomItem('${section.title}')"><div class="icon-badge"><i class="fa-solid fa-plus"></i></div><div class="name">إضافة تصنيف جديد</div></button>` : ''}
      </div>
      ${!editMode && visibleItems.length > COLLAPSE_LIMIT ? `
        <button type="button" class="show-more-btn" onclick="toggleSection('${section.title.replace(/'/g,"\\'")}')">
          ${isExpanded ? 'عرض أقل ▴' : `عرض الكل (${visibleItems.length}) ▾`}
        </button>` : ''}`;
    wrap.appendChild(sec);
  });

  if (editMode){
    const saveWrap = document.createElement('div');
    saveWrap.className = 'toolbar';
    saveWrap.innerHTML = `<button class="btn btn-brass" onclick="saveCity()"><i class="fa-solid fa-floppy-disk"></i> حفظ (${allCities().find(c=>c.id===currentCityId)?.name || ''})</button>`;
    wrap.appendChild(saveWrap);
  }
}

/* =========================================================
   6) نافذة الإدخال العامة، QR، نسخ الرابط
   ========================================================= */
function toggleSection(title){
  expandedSections[title] = !expandedSections[title];
  render();
}

let modalResolve = null;
function openInputModal(title, placeholder, initialValue){
  return new Promise((resolve) => {
    modalResolve = resolve;
    document.getElementById('inputModalTitle').textContent = title;
    const f = document.getElementById('inputModalField');
    f.placeholder = placeholder || ''; f.value = initialValue || '';
    document.getElementById('inputModalError').textContent = '';
    document.getElementById('inputBackdrop').classList.add('show');
    setTimeout(()=> f.focus(), 50);
  });
}
function confirmInputModal(){
  const val = document.getElementById('inputModalField').value;
  document.getElementById('inputBackdrop').classList.remove('show');
  if (modalResolve){ modalResolve(val); modalResolve = null; }
}
function closeInputModal(){
  document.getElementById('inputBackdrop').classList.remove('show');
  if (modalResolve){ modalResolve(null); modalResolve = null; }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2200);
}
function copyLink(){
  navigator.clipboard.writeText(window.location.href).then(()=> showToast('تم نسخ الرابط ✓'))
    .catch(()=> showToast('انسخ الرابط يدويًا من شريط العنوان'));
}
function showQR(){
  const box = document.getElementById('qrcode'); box.innerHTML = '';
  try{ new QRCode(box, { text: window.location.href, width:180, height:180, colorDark:'#1c2b3a', colorLight:'#faf6ec' }); }
  catch(e){ box.innerHTML = '<div style="font-size:12px;color:#4a5a68">تعذر توليد الرمز</div>'; }
  document.getElementById('qrBackdrop').classList.add('show');
}
function closeQR(){ document.getElementById('qrBackdrop').classList.remove('show'); }

/* =========================================================
   7) بدء التشغيل
   ========================================================= */
(async function init(){
  await initFirebase();
  await loadPassword();
  checkOwnerAccess();
  await loadCustomCities();
  await loadCustomCountries();
  await loadAllCityStatus();
  trackVisit(); // لا ننتظرها، ما نأخر تحميل الصفحة
  await loadCity(pickInitialCity());
})();
</script>
